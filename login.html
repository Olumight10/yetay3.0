<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Yetay 3.0 Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Open Sans', sans-serif; }
        h1, h2, h3, .font-heading { font-family: 'Montserrat', sans-serif; }
        
        .bg-image-overlay {
            background: linear-gradient(rgba(0, 86, 179, 0.85), rgba(0, 61, 130, 0.95)), url('MAK_7257.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
    </style>
</head>
<body class="bg-image-overlay text-gray-800 flex flex-col min-h-screen pt-20">

    <nav class="bg-white shadow-md fixed w-full z-50 top-0 h-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-full">
            <div class="flex justify-between items-center h-full w-full">
                
                <div class="flex items-center flex-shrink-0 max-w-[70%]">
                    <img src="logo.png" alt="Yetay Logo" class="h-10 w-auto object-contain mr-3" onerror="this.style.display='none'">
                    <span class="font-heading font-bold text-xl text-blue-900 truncate">YETAY</span>
                </div>
                
                <div class="hidden md:flex items-center space-x-6 lg:space-x-8">
                    <a href="index.html" class="text-gray-600 hover:text-blue-900 transition">Home</a>
                    <a href="about.html" class="text-gray-600 hover:text-blue-900 transition">About</a>
                    <a href="highlights.html" class="text-gray-600 hover:text-blue-900 transition">Highlights</a>
                    <a href="editions.html" class="text-gray-600 hover:text-blue-900 transition">Editions</a>
                    <a href="yetay3.html" class="text-gray-600 hover:text-blue-900 transition">Yetay 3.0</a>
                    <a href="register.html" class="text-gray-600 hover:text-blue-900 transition">Registration</a>
                    <a href="login.html" class="bg-yellow-500 text-blue-900 px-5 py-2 rounded shadow-md hover:bg-yellow-400 transition font-bold tracking-wide uppercase text-sm">Login</a>
                </div>

                <div class="flex items-center md:hidden flex-shrink-0">
                    <button id="mobile-menu-btn" class="text-blue-900 hover:text-yellow-500 focus:outline-none p-2 rounded-md">
                        <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-gray-200 shadow-2xl absolute w-full left-0 top-20">
            <div class="px-4 pt-2 pb-6 space-y-1">
                <a href="index.html" class="block px-3 py-3 text-gray-600 hover:bg-blue-50 hover:text-blue-900 transition">Home</a>
                <a href="about.html" class="block px-3 py-3 text-gray-600 hover:bg-blue-50 hover:text-blue-900 transition">About</a>
                <a href="highlights.html" class="block px-3 py-3 text-gray-600 hover:bg-blue-50 hover:text-blue-900 transition">Highlights</a>
                <a href="editions.html" class="block px-3 py-3 text-gray-600 hover:bg-blue-50 hover:text-blue-900 transition">Editions</a>
                <a href="yetay3.html" class="block px-3 py-3 text-gray-600 hover:bg-blue-50 hover:text-blue-900 transition">Yetay 3.0</a>
                <a href="register.html" class="block px-3 py-3 text-gray-600 hover:bg-blue-50 hover:text-blue-900 transition">Registration</a>
                <a href="login.html" class="block px-3 py-3 mt-4 bg-yellow-500 text-blue-900 text-center rounded shadow font-bold border-l-4 border-blue-900">Login</a>
            </div>
        </div>
    </nav>

    <div class="flex-grow flex items-center justify-center p-4 py-12">
        <div class="bg-white w-full max-w-md rounded-xl shadow-2xl overflow-hidden mt-6">
            
            <div class="bg-blue-900 p-8 text-center text-white relative">
                <img src="logo.png" alt="Logo" class="h-16 mx-auto mb-4 bg-white rounded p-1" onerror="this.style.display='none'">
                <h1 class="text-2xl font-bold text-yellow-400 mb-1">WELCOME BACK</h1>
                <p class="text-blue-100 text-sm">Access your Church or Admin Portal</p>
            </div>

            <form id="loginForm" class="p-8">
                <div class="space-y-5">
                    <div>
                        <label for="userId" class="block font-semibold text-gray-700 mb-1">Registration ID / Username</label>
                        <input type="text" id="userId" placeholder="Enter your ID (e.g., YETAY-001)" required 
                               class="w-full px-4 py-3 rounded-md border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-900 focus:border-transparent transition">
                    </div>

                    <div>
                        <label for="password" class="block font-semibold text-gray-700 mb-1">Password</label>
                        <input type="password" id="password" placeholder="Enter your password" required 
                               class="w-full px-4 py-3 rounded-md border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-900 focus:border-transparent transition">
                    </div>
                </div>

                <div class="mt-8">
                    <button type="submit" id="loginBtn" class="w-full bg-blue-900 text-white font-bold py-3 px-6 rounded-md shadow hover:bg-blue-800 transition">
                        Access Portal
                    </button>
                </div>
                
                <div class="mt-6 text-center text-sm text-gray-500 border-t pt-4">
                    <p>Not registered yet? <a href="register.html" class="text-blue-900 font-bold hover:underline">Register your church here.</a></p>
                </div>
            </form>
        </div>
    </div>

    <footer class="bg-blue-900 text-white py-6 w-full border-t border-blue-800 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-gray-400 text-sm">&copy; 2026 Banner Unto Nations Foundation. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const btnMenu = document.getElementById('mobile-menu-btn');
        const menu = document.getElementById('mobile-menu');
        btnMenu.addEventListener('click', () => menu.classList.toggle('hidden'));

        document.addEventListener("DOMContentLoaded", () => {
            const form = document.getElementById("loginForm");

            form.addEventListener("submit", async (event) => {
                event.preventDefault();

                const userIdInput = document.getElementById('userId').value;
                const passwordInput = document.getElementById('password').value;
                const btn = document.getElementById('loginBtn');
                
                btn.disabled = true;
                btn.classList.add('opacity-50', 'cursor-not-allowed');
                btn.textContent = "Authenticating...";

                // Prepare data for Google Apps Script
                const params = new URLSearchParams();
                params.append("action", "login"); // Tells the backend to route to handleLogin()
                params.append("userId", userIdInput);
                params.append("password", passwordInput);

                try {
                    // PASTE YOUR NEW APPS SCRIPT URL HERE
                    const scriptURL = "https://script.google.com/macros/s/AKfycbzMnfYQ-gfbxlnUNnzmLuY3uaBjLfHldWkXFQK0jvN31hNrDNHTsuJOsAIAdwBzR9ar/exec";
                    
                    const response = await fetch(scriptURL, {
                        method: "POST",
                        headers: { "Content-Type": "application/x-www-form-urlencoded" },
                        body: params.toString(),
                    });

                    const result = await response.json();

                    if (result.success) {
                        // Store the real data pulled from the Google Sheet
                        localStorage.setItem("yetay_session_id", result.userId);
                        localStorage.setItem("yetay_session_role", result.type);
                        
                        if (result.type === "admin") {
                            localStorage.setItem("yetay_admin_role", result.role);
                            localStorage.setItem("yetay_admin_team", result.team);
                            
                            Swal.fire({
                                icon: 'success', title: 'Admin Access Granted',
                                text: 'Routing to Admin Workspace...', showConfirmButton: false, timer: 1500
                            }).then(() => window.location.href = "admin-dashboard.html");
                            
                        } else {
                            localStorage.setItem("yetay_church_name", result.churchName);
                            
                            Swal.fire({
                                icon: 'success', title: 'Church Access Granted',
                                text: 'Routing to Church Portal...', showConfirmButton: false, timer: 1500
                            }).then(() => window.location.href = "church-dashboard.html");
                        }
                    } else {
                        throw new Error(result.message);
                    }
                } catch (error) {
                    Swal.fire({
                        icon: 'error', title: 'Access Denied', text: error.message, confirmButtonColor: '#1e3a8a'
                    });
                    btn.disabled = false;
                    btn.classList.remove('opacity-50', 'cursor-not-allowed');
                    btn.textContent = "Access Portal";
                }
            });
        });
    </script>
</body>
</html>
